<!DOCTYPE html>
<html>
<head>
  <title>Quiz App</title>

  <!-- AdSense -->
  <script async 
    src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-8679955866242866"
     crossorigin="anonymous"></script>"
    crossorigin="anonymous"></script>

  <style>
    body {
      font-family: Arial;
      text-align: center;
      background: #f2f2f2;
      padding: 20px;
    }

    .card {
      background: white;
      padding: 20px;
      border-radius: 12px;
      max-width: 400px;
      margin: auto;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }

    .option {
      display: block;
      margin: 8px;
      padding: 10px;
      background: #eee;
      border-radius: 8px;
      cursor: pointer;
    }

    .option:hover {
      background: #ddd;
    }

    .ad {
      margin: 20px 0;
    }
  </style>
</head>

<body>

<h2>🧠 Quiz App</h2>

<!-- Top Ad -->
<div class="ad">
  <ins class="adsbygoogle"
       style="display:block"
       data-ad-client="<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-8679955866242866"
     crossorigin="anonymous"></script>"
       data-ad-slot="TOP-AD"
       data-ad-format="auto"></ins>
</div>

<div class="card">
  <p id="question">Loading...</p>
  <div id="options"></div>
</div>

<!-- Bottom Ad -->
<div class="ad">
  <ins class="adsbygoogle"
       style="display:block"
       data-ad-client="<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-8679955866242866"
     crossorigin="anonymous"></script>"
       data-ad-slot="BOTTOM-AD"
       data-ad-format="auto"></ins>
</div>

<script>
(adsbygoogle = window.adsbygoogle || []).push({});
(adsbygoogle = window.adsbygoogle || []).push({});

let correctAnswer = "";
let usedQuestions = new Set();

// 🔥 JSON files list
const files = [
  "questions1.json"
];

// random file
function getRandomFile() {
  return files[Math.floor(Math.random() * files.length)];
}

// load question
async function loadQuestion() {
  document.getElementById("question").innerText = "Loading...";

  try {
    let file = getRandomFile();

    const res = await fetch(file);
    const data = await res.json();

    let q = data[Math.floor(Math.random() * data.length)];

    // avoid repeat
    if (usedQuestions.has(q.question)) {
      return loadQuestion();
    }

    usedQuestions.add(q.question);

    document.getElementById("question").innerText = q.question;
    correctAnswer = q.answer;

    let optionsContainer = document.getElementById("options");
    optionsContainer.innerHTML = "";

    q.options.forEach(opt => {
      let div = document.createElement("div");
      div.className = "option";
      div.innerText = opt;

      div.addEventListener("click", function() {
        checkAnswer(opt);
      });

      optionsContainer.appendChild(div);
    });

  } catch (e) {
    document.getElementById("question").innerText = "Error loading question";
    console.log(e);
  }
}

// check answer
function checkAnswer(ans) {
  if (ans === correctAnswer) {
    alert("✅ Correct!");
  } else {
    alert("❌ Wrong! Correct: " + correctAnswer);
  }

  loadQuestion();
}

// start
loadQuestion();
</script>

</body>
</html>
